<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>構図ガイドカメラ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <video id="camera" playsinline muted autoplay></video>

    <div id="overlayContainer">
      <canvas id="guideCanvas"></canvas>
    </div>

    <header id="topBar">
      <div id="aspectControls" class="controls-row"></div>
      <div id="opacityControl" class="controls-row">
        <label for="opacitySlider">濃度</label>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="0.8" />
      </div>
      <div id="burnInControl" class="controls-row">
        <input type="checkbox" id="burnInToggle" />
        <label for="burnInToggle">ガイド焼き込み</label>
      </div>
    </header>

    <footer id="bottomBar">
      <div id="shutterContainer">
        <button id="shutterBtn" type="button" aria-label="撮影">
          <svg viewBox="0 0 48 48" width="48" height="48">
            <circle cx="24" cy="24" r="20" fill="currentColor" />
            <circle cx="24" cy="24" r="16" fill="#000" />
          </svg>
        </button>
      </div>
      <div id="guideStrip"></div>
    </footer>

    <div id="errorOverlay" class="is-hidden">
      <p>カメラにアクセスできません</p>
      <button id="retryBtn" type="button">再試行</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" integrity="sha384-vE8hbVJ4lezako5rlvE7bY0BVzWlFhZncPlckrqNwcUQpVtgbENTgZ8TBbnPjZre" crossorigin="anonymous" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js" integrity="sha384-7qLdgfEQyO9ZQi9ArRHigK+IBto4XPk468jAqc+fnsXaZIcMAhQeLwzggRK7aESl" crossorigin="anonymous" defer></script>
  <script type="module" src="src/app.js" defer></script>
</body>
</html>
