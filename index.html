<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="構図ガイド" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="robots" content="noindex, nofollow" />
  <title>構図ガイドカメラ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <video id="camera" playsinline muted autoplay></video>

    <div id="overlayContainer">
      <canvas id="guideCanvas"></canvas>
    </div>

    <header id="topBar">
      <div id="autoRecommendControl" class="controls-row">
        <input type="checkbox" id="autoRecommendToggle" checked />
        <label for="autoRecommendToggle">おまかせ構図</label>
      </div>
      <button id="settingsBtn" type="button" aria-label="設定">⚙</button>
    </header>

    <div id="settingsPanel" class="is-hidden">
      <div id="aspectControls" class="controls-row"></div>
      <div id="opacityControl" class="controls-row">
        <label for="opacitySlider">濃度</label>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="0.5" />
      </div>
      <div id="burnInControl" class="controls-row">
        <input type="checkbox" id="burnInToggle" />
        <label for="burnInToggle">ガイド焼き込み</label>
      </div>
      <div id="levelControl" class="controls-row is-hidden">
        <input type="checkbox" id="levelToggle" />
        <label for="levelToggle">水平ガイド</label>
      </div>
    </div>

    <div id="toast" class="is-hidden" role="status" aria-live="polite"></div>

    <footer id="bottomBar">
      <div id="sizeAdvice" class="is-hidden"></div>
      <div id="shutterRow">
        <button id="guideStripToggleBtn" type="button" class="pill-btn">構図を選ぶ</button>
        <div id="shutterContainer">
          <button id="shutterBtn" type="button" aria-label="撮影">
            <svg viewBox="0 0 48 48" width="48" height="48">
              <circle cx="24" cy="24" r="20" fill="currentColor" />
              <circle cx="24" cy="24" r="16" fill="#000" />
            </svg>
          </button>
        </div>
        <div class="pill-btn-spacer"></div>
      </div>
      <div id="guideStrip" class="is-hidden"></div>
    </footer>

    <div id="errorOverlay" class="is-hidden">
      <p>カメラにアクセスできません</p>
      <button id="retryBtn" type="button">再試行</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" integrity="sha384-vE8hbVJ4lezako5rlvE7bY0BVzWlFhZncPlckrqNwcUQpVtgbENTgZ8TBbnPjZre" crossorigin="anonymous" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js" integrity="sha384-7qLdgfEQyO9ZQi9ArRHigK+IBto4XPk468jAqc+fnsXaZIcMAhQeLwzggRK7aESl" crossorigin="anonymous" defer></script>
  <script type="module" src="src/app.js" defer></script>
</body>
</html>
